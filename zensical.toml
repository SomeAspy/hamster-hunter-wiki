[project]
site_name = "Official Hamster Hunter Wiki"
site_dir = "dist"
docs_dir = "pages"
site_url = "https://hh.github.aspy.dev"
site_description = "The official developer-approved wiki for Hamster Hunter"
site_author = "Hamster Hunter Wiki Contributors"
repo_url = "https://github.com/someaspy/hamster-hunter-wiki"
edit_uri = "edit/main/pages"
copyright = "&copy; 2026 Hamuno & Hamster Hunter Wiki contributors"

[project.theme]
logo = "/assets/hamster.webp"
favicon = "/assets/blood-splatter-png-5.webp"
features = [
    "search.highlight",
    "content.action.edit",
    "content.action.view"
]
font = false # Don't make a connection to Google fonts

[[project.extra.social]]
icon = "fontawesome/brands/discord"
link = "https://discord.gg/jYtM6Xym5U"

[[project.extra.social]]
icon = "fontawesome/brands/steam"
link = "https://store.steampowered.com/app/2726490/Hamster_Hunter"

[[project.extra.social]]
icon = "fontawesome/brands/youtube"
link = "https://www.youtube.com/@Hamunoo"

[project.theme.icon]
repo = "fontawesome/brands/github"

[project.theme.palette]
scheme = "slate"

[project.markdown_extensions.zensical.extensions.macros]
module_name = "macros"

[project.markdown_extensions.md_in_html]
[project.markdown_extensions.attr_list]

[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji" 
emoji_generator = "zensical.extensions.emoji.to_svg"